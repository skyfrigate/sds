<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sds-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Hexagonal badge (common element) -->
  <polygon points="150,20 250,75 250,185 150,240 50,185 50,75" 
           fill="url(#sds-bg)" 
           stroke="#059669" 
           stroke-width="4"
           filter="url(#shadow)"/>
  
  <!-- Inner hexagon border -->
  <polygon points="150,35 235,82.5 235,177.5 150,225 65,177.5 65,82.5" 
           fill="none" 
           stroke="#34d399" 
           stroke-width="2"
           opacity="0.5"/>
  
  <!-- Tree/Graph structure symbol -->
  <g>
    <!-- Root node -->
    <circle cx="150" cy="80" r="12" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Level 2 -->
    <line x1="150" y1="92" x2="110" y2="120" stroke="#ffffff" stroke-width="3"/>
    <line x1="150" y1="92" x2="150" y2="120" stroke="#ffffff" stroke-width="3"/>
    <line x1="150" y1="92" x2="190" y2="120" stroke="#ffffff" stroke-width="3"/>
    <circle cx="110" cy="120" r="10" fill="#ffffff"/>
    <circle cx="150" cy="120" r="10" fill="#ffffff"/>
    <circle cx="190" cy="120" r="10" fill="#ffffff"/>
    
    <!-- Level 3 -->
    <line x1="110" y1="130" x2="90" y2="155" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="110" y1="130" x2="130" y2="155" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="150" y1="130" x2="150" y2="155" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="190" y1="130" x2="170" y2="155" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="190" y1="130" x2="210" y2="155" stroke="#ffffff" stroke-width="2.5"/>
    
    <circle cx="90" cy="155" r="8" fill="#ffffff"/>
    <circle cx="130" cy="155" r="8" fill="#ffffff"/>
    <circle cx="150" cy="155" r="8" fill="#ffffff"/>
    <circle cx="170" cy="155" r="8" fill="#ffffff"/>
    <circle cx="210" cy="155" r="8" fill="#ffffff"/>
    
    <!-- Level 4 (leaves) -->
    <line x1="90" y1="163" x2="75" y2="180" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <line x1="90" y1="163" x2="105" y2="180" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <line x1="210" y1="163" x2="195" y2="180" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <line x1="210" y1="163" x2="225" y2="180" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    
    <circle cx="75" cy="180" r="6" fill="#ffffff" opacity="0.8"/>
    <circle cx="105" cy="180" r="6" fill="#ffffff" opacity="0.8"/>
    <circle cx="195" cy="180" r="6" fill="#ffffff" opacity="0.8"/>
    <circle cx="225" cy="180" r="6" fill="#ffffff" opacity="0.8"/>
  </g>
  
  <!-- Project name -->
  <text x="150" y="210" 
        font-family="'Courier New', monospace" 
        font-size="24" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">sds</text>
  
  <!-- Tools badge (common element) -->
  <rect x="110" y="250" width="80" height="30" rx="15" fill="#047857" stroke="#34d399" stroke-width="2"/>
  <text x="150" y="270" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">tools</text>
</svg>
