name: "✨ Feature"
description: "Propose a new feature or improvement."
title: "[FEAT] "
labels:
  - "type: feature"
  - "status: triage"

body:
  - type: textarea
    id: motivation
    attributes:
      label: "Why?"
      description: >
        What problem does this feature solve?
        Which use case is currently impossible or cumbersome?
      placeholder: |
        As a user, I cannot…
        The current limitation of the `xxx` module forces me to…
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "What?"
      description: "Precise description of the desired feature."
      placeholder: |
        Add a method `xxx` on `YyyClass` that…
        The `zzz` module should expose an interface enabling…
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: >
        Verifiable conditions. Each criterion should map to
        a unit test or documentation test.
      placeholder: |
        - [ ] `pytest` passes — coverage ≥ 85 %
        - [ ] `flake8` and `mypy`: 0 errors
        - [ ] doctest examples compile and pass
        - [ ] Existing public API unchanged
        - [ ] `CHANGELOG.md` updated
      render: markdown
    validations:
      required: true

  - type: textarea
    id: api-sketch
    attributes:
      label: "API sketch (optional)"
      description: >
        Proposed signatures, usage examples, or configuration structure.
        Need not be final.
      placeholder: |
        ```python
        class MyFormatter:
            def format(self, config: AppConfig) -> str:
                ...

        # In Builder
        def set_formatter(self, f: MyFormatter) -> "Builder":
            ...
        ```
      render: markdown
    validations:
      required: false

  - type: input
    id: related-dd
    attributes:
      label: "Related Design Decisions"
      description: "DD issue numbers covering the associated architecture choices."
      placeholder: "#xx (DD010), #xx (DD012)"
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: "Affected scopes"
      description: "Apply the matching `scope:` labels manually after creation."
      options:
        - label: "`api` — public interface"
        - label: "`cli` — command-line interface"
        - label: "`docs` — docstrings, Sphinx, guides"
        - label: "`tests` — pytest, coverage"
        - label: "`ci` — tox, GitHub Actions, pipeline"

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Apply the matching `priority:` label after creation."
      options:
        - "none — nice-to-have, outside immediate roadmap"
        - "low — in the next version"
        - "medium — in the target version"
        - "high — blocks the release"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: "Estimated effort"
      description: "Apply the matching `effort:` label after creation."
      options:
        - "XS — < 1 h"
        - "S  — half-day"
        - "M  — 1 day"
        - "L  — 2–3 days"
        - "XL — > 3 days"
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: "Breaking change?"
      description: >
        If yes, replace `type: feature` with `type: breaking`
        and update the version constraints accordingly.
      options:
        - "No — backward-compatible"
        - "Yes — requires a minor or major version bump"
    validations:
      required: true

  - type: checkboxes
    id: submit-checklist
    attributes:
      label: "Pre-submission checklist"
      options:
        - label: "The feature does not already exist (checked docs and open issues)"
          required: true
        - label: "The backward-compatibility constraint has been assessed"
          required: true
        - label: "A DD issue is created or referenced if architecture choices are involved"
