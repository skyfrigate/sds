name: "🔧 Maintenance"
description: >
  Technical task with no new feature: docs, refactoring,
  tests, CI/CD, performance, deprecation.
title: "[MAINT] "
labels:
  - "status: triage"

body:
  - type: dropdown
    id: maint-type
    attributes:
      label: "Task type"
      description: >
        Select the primary type, then replace `status: triage`
        with the matching `type:` label after creation.
      options:
        - "chore       — dependencies, housekeeping, configuration"
        - "docs        — docstrings, Sphinx, README, guides, examples"
        - "test        — adding or fixing tests, coverage"
        - "refactor    — restructuring without behaviour change"
        - "ci          — tox, GitHub Actions, pipeline config"
        - "perf        — performance optimisation"
        - "deprecation — mark obsolete code with deprecation warnings"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "What needs to be done, and why now?"
      placeholder: >
        Update `requests` from `2.31` to `2.32` following the upstream
        changelog. Verify the HTTP client behaviour is identical after the update.
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "Completion criteria"
      description: "Objective conditions to close this issue."
      placeholder: |
        - [ ] `pytest --tb=short` passes
        - [ ] `tox -e ci-quality`: 0 errors (mypy, flake8, isort, bandit)
        - [ ] Coverage ≥ threshold defined in `tox.ini`
        - [ ] `CHANGELOG.md` updated if necessary
        - [ ] `requirements*.txt` or `pyproject.toml` committed if a dependency was updated
      render: markdown
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Urgency (optional)"
      description: >
        Why this task now rather than later?
        E.g.: vulnerability (CVE), blocking technical debt, prerequisite for a feature.
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: "Affected scopes"
      description: "Apply the matching `scope:` labels manually after creation."
      options:
        - label: "`api` — public interface"
        - label: "`cli` — command-line interface"
        - label: "`docs` — docstrings, Sphinx, guides"
        - label: "`tests` — pytest, coverage"
        - label: "`ci` — tox, GitHub Actions, pipeline"

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Apply the matching `priority:` label after creation."
      options:
        - "none — someday, out of sprint"
        - "low — before the next minor version"
        - "medium — in the target version"
        - "high — blocks the release or CI"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: "Estimated effort"
      description: "Apply the matching `effort:` label after creation."
      options:
        - "XS — < 1 h"
        - "S  — half-day"
        - "M  — 1 day"
        - "L  — 2–3 days"
        - "XL — > 3 days"
    validations:
      required: true

  - type: dropdown
    id: ecosystem
    attributes:
      label: "Ecosystem layer"
      description: "Apply the matching `ecosystem:` label after creation."
      options:
        - "language — Python idioms, typing"
        - "framework — library or framework architecture"
        - "ops — PyPI publishing, packaging, Docker"
        - "pipeline — tox, GitHub Actions, CI tooling"
    validations:
      required: false

  - type: textarea
    id: dep-update
    attributes:
      label: "Dependency update detail (optional)"
      description: "Fill in only for a dependency-update `type: chore`."
      placeholder: |
        | Package   | Before  | After   | Breaking? |
        |-----------|---------|---------|-----------|
        | requests  | 2.31.0  | 2.32.x  | No        |
        | pydantic  | 1.10.x  | 2.x     | Yes       |
      render: markdown
    validations:
      required: false
